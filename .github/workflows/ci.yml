name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependencias
        run: pip install ruff
      - name: Validar código
        run: bash validate.sh

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'  # ← Solo en main
    steps:
      - name: Construir para producción
        run: |
          echo "build app..."
          # Comandos para construir tu app
          # Ejemplo para Python:
          # pip install -r requirements.txt
          # python setup.py build
      
      - name: Generar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/  # ← Guardas el build como artefacto
      
      - name: Notifaction successfully
        run: echo "✅ Deploy done withou AWS!"