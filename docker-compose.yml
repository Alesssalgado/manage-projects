services:
  api:
    build: .
    container_name: manage-projects-api
    ports:
      - "8000:80"
    env_file:
      - .env
    volumes:
      - ./uploads:/manage-projects-main/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s